<!DOCTYPE html>
<html>
<head>
<title>Sweet Spot Menu</title>

<style>

body{
margin:0;
font-family:Georgia;
background:#2b140c;
color:white;
}

h1{
text-align:center;
padding:20px;
color:#f8e6c8;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
padding:40px;
}

.card{
background:#3b1f14;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#ffd27f;
font-size:18px;
}

</style>

</head>

<body>

<h1>Our Desserts</h1>

<div class="menu-grid" id="menu"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
"https://bpewdkvtcglogscbgdwj.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwZXdka3Z0Y2dsb2dzY2JnZHdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTY4MjIsImV4cCI6MjA4ODk5MjgyMn0.zwwS6fHyBVnz3vClyQArykSNJIZo8Z5awhs9ODaRsoE"
)

async function loadMenu(){

const { data } = await supabase
.from("desserts")
.select("*")

let menu=document.getElementById("menu")

data.forEach(d=>{

menu.innerHTML += `

<div class="card">
<img src="${d.image}">
<h3>${d.name}</h3>
<p class="price">₹${d.price}</p>
</div>

`

})

}

loadMenu()

</script>

</body>
</html>
